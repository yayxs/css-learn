<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS垂直居中</title>
    <style>
      html,
      body,
      #container {
        width: 100%;
        height: 100%;
        background-color: black;
      }
      #center {
        width: 200px;
        height: 200px;
        background-color: red;
        position: absolute;
        left: 50%;
        top: 50%;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="center"></div>
    </div>
  </body>
</html>
